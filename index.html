<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Scratch King - Wave Runner Edition</title>
    <style>
        :root {
            --accent: #00f2ff;
            --accent2: #ff0055;
            --gold: #ffd700;
            --bg: #050510;
            --bg2: #100520;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, var(--bg), var(--bg2));
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        #loading-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000;
            background: var(--bg);
        }

        .spinner {
            width: 50px; height: 50px; border: 4px solid var(--glass-border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .auth-container {
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            padding: 2rem; border-radius: 20px; width: 350px; backdrop-filter: blur(10px);
            text-align: center;
        }

        input {
            width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 10px;
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2);
            color: white; outline: none;
        }

        .btn {
            width: 100%; padding: 0.8rem; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-primary { background: var(--accent); color: black; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--accent); }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2rem; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass-border);
        }

        .hud-item { background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.9rem; }

        .tickets-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem; padding: 2rem;
        }

        .ticket {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 1.5rem; border-radius: var(--radius); cursor: pointer;
            text-align: center; transition: 0.3s;
        }
        .ticket:hover { border-color: var(--accent); transform: translateY(-5px); }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 500;
        }
        .modal-content {
            background: var(--bg2); border: 1px solid var(--glass-border);
            padding: 2rem; border-radius: 20px; max-width: 400px; width: 90%; text-align: center;
        }

        #scratch-canvas { border-radius: 10px; cursor: crosshair; background: #222; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent);
            color: black; padding: 1rem; border-radius: 10px; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <h1 style="margin-bottom: 1rem; color: var(--accent);">🌊 WAVE RUNNER</h1>
    <div class="spinner"></div>
</div>

<div id="auth-screen" class="hidden">
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="margin-bottom: 1.5rem;">Scratch King</h2>
            <input type="text" id="username" placeholder="Pseudo">
            <input type="password" id="password" placeholder="Mot de passe">
            <button class="btn btn-primary" onclick="login()">Se connecter / S'inscrire</button>
            <p id="auth-msg" style="margin-top: 1rem; font-size: 0.8rem; color: #aaa;">Compte admin: ADMIN / 135975</p>
        </div>
    </div>
</div>

<div id="game-screen" class="hidden">
    <header>
        <h2 style="color: var(--accent);">👑 Scratch King</h2>
        <div style="display: flex; gap: 1rem;">
            <div class="hud-item" id="hud-coins">💰 0</div>
            <div class="hud-item" id="hud-xp">⭐ XP: 0</div>
            <div class="hud-item" id="hud-level">🏆 Niv. 1</div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn" style="background: var(--accent2); color: white; padding: 0.5rem 1rem;" id="admin-btn" onclick="openAdmin()">⚙️</button>
            <button class="btn" style="background: #333; color: white; padding: 0.5rem 1rem;" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="tickets-grid" id="tickets"></div>
</div>

<div id="scratch-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="ticket-title" style="margin-bottom: 1rem;">Grattez !</h3>
        <div style="position: relative; width: 300px; height: 150px; margin: 0 auto;">
            <div id="scratch-result" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5rem; z-index: 1;"></div>
            <canvas id="scratch-canvas" width="300" height="150" style="position: relative; z-index: 2;"></canvas>
        </div>
        <button id="collect-btn" class="btn btn-primary hidden" style="margin-top: 1.5rem;" onclick="collectPrize()">Encaisser !</button>
    </div>
</div>

<div id="admin-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 600px;">
        <h3 style="margin-bottom: 1rem;">Panel Admin</h3>
        <div id="admin-list" style="max-height: 300px; overflow-y: auto; text-align: left; font-size: 0.8rem;"></div>
        <button class="btn btn-primary" style="margin-top: 1rem;" onclick="document.getElementById('admin-modal').classList.add('hidden')">Fermer</button>
    </div>
</div>

<div id="loan-modal" class="modal hidden">
    <div class="modal-content">
        <h3>💸 Plus de sous ?</h3>
        <p style="margin: 1rem 0;">Nous pouvons te prêter 100 💰. Tu les rembourseras automatiquement quand tu seras riche !</p>
        <button class="btn btn-primary" onclick="takeLoan()">Accepter le prêt</button>
        <button class="btn" style="background: transparent; color: white; margin-top: 0.5rem;" onclick="document.getElementById('loan-modal').classList.add('hidden')">Non merci</button>
    </div>
</div>

<div id="toast-container"></div>

<script>
    let player = null;
    let currentTicket = null;
    let isScratching = false;

    const TICKETS = [
        { id: 'bronze', name: 'Ticket Bronze', price: 10, max: 50, color: '#cd7f32', emoji: '🥉' },
        { id: 'silver', name: 'Ticket Argent', price: 50, max: 300, color: '#c0c0c0', emoji: '🥈' },
        { id: 'gold', name: 'Ticket Or', price: 200, max: 1500, color: '#ffd700', emoji: '🥇' },
        { id: 'diamond', name: 'Ticket Diamant', price: 1000, max: 10000, color: '#b9f2ff', emoji: '💎' }
    ];

    function save() {
        const users = JSON.parse(localStorage.getItem('sk_users') || '[]');
        const idx = users.findIndex(u => u.username === player.username);
        users[idx] = player;
        localStorage.setItem('sk_users', JSON.stringify(users));
    }

    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert('Remplis tout !');

        const users = JSON.parse(localStorage.getItem('sk_users') || '[]');
        if(u === 'ADMIN' && p === '135975' && !users.find(x => x.username === 'ADMIN')) {
            users.push({ username: 'ADMIN', password: '135975', coins: 999999, xp: 0, level: 100, debt: 0 });
            localStorage.setItem('sk_users', JSON.stringify(users));
        }

        let user = users.find(x => x.username === u);
        if(!user) {
            user = { username: u, password: p, coins: 500, xp: 0, level: 1, debt: 0 };
            users.push(user);
            localStorage.setItem('sk_users', JSON.stringify(users));
        } else if(user.password !== p) {
            return alert('Mauvais mot de passe');
        }

        player = user;
        start();
    }

    function start() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        updateUI();
        render();
    }

    function updateUI() {
        document.getElementById('hud-coins').innerText = `💰 ${Math.floor(player.coins)}`;
        document.getElementById('hud-xp').innerText = `⭐ XP: ${player.xp}`;
        document.getElementById('hud-level').innerText = `🏆 Niv. ${player.level}`;
        if(player.username === 'ADMIN') document.getElementById('admin-btn').classList.remove('hidden');
        else document.getElementById('admin-btn').classList.add('hidden');

        if(player.debt > 0 && player.coins >= player.debt * 2) {
            player.coins -= player.debt;
            showToast(`Dette de ${player.debt} remboursée !`);
            player.debt = 0;
            save();
        }
    }

    function render() {
        const grid = document.getElementById('tickets');
        grid.innerHTML = TICKETS.map(t => `
            <div class="ticket" onclick="buyTicket('${t.id}')">
                <div style="font-size: 3rem;">${t.emoji}</div>
                <h3 style="margin: 0.5rem 0;">${t.name}</h3>
                <p style="color: var(--gold); font-weight: bold;">${t.price} 💰</p>
                <p style="font-size: 0.7rem; color: #aaa;">Gagnez jusqu'à ${t.max} !</p>
            </div>
        `).join('');
    }

    function buyTicket(id) {
        const t = TICKETS.find(x => x.id === id);
        if(player.coins < t.price) return document.getElementById('loan-modal').classList.remove('hidden');

        player.coins -= t.price;
        currentTicket = t;
        openScratch();
        save();
        updateUI();
    }

    function openScratch() {
        const modal = document.getElementById('scratch-modal');
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('scratch-result');

        const win = Math.random() < 0.4;
        const prize = win ? Math.floor(Math.random() * currentTicket.max) + 1 : 0;
        player.lastPrize = prize;

        resultDiv.innerText = prize > 0 ? `GAGNÉ: ${prize} 💰` : "PERDU 😢";
        resultDiv.style.color = prize > 0 ? 'var(--gold)' : '#ff4444';

        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = currentTicket.color;
        ctx.fillRect(0, 0, 300, 150);
        ctx.fillStyle = '#222';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(currentTicket.name, 150, 85);

        document.getElementById('collect-btn').classList.add('hidden');
        modal.classList.remove('hidden');

        canvas.onmousedown = () => isScratching = true;
        window.onmouseup = () => isScratching = false;
        canvas.onmousemove = e => {
            if(!isScratching) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 15, 0, Math.PI * 2); ctx.fill();
            checkScratch();
        };
    }

    function checkScratch() {
        const ctx = document.getElementById('scratch-canvas').getContext('2d');
        const data = ctx.getImageData(0,0,300,150).data;
        let cleared = 0;
        for(let i=3; i<data.length; i+=4) if(data[i] === 0) cleared++;
        if(cleared / (300*150) > 0.6) document.getElementById('collect-btn').classList.remove('hidden');
    }

    function collectPrize() {
        player.coins += player.lastPrize;
        player.xp += 10;
        if(player.xp >= player.level * 50) {
            player.level++;
            player.xp = 0;
            showToast(`LEVEL UP! Tu es Niv. ${player.level}`);
        }
        document.getElementById('scratch-modal').classList.add('hidden');
        save();
        updateUI();
    }

    function openAdmin() {
        const users = JSON.parse(localStorage.getItem('sk_users') || '[]');
        const list = document.getElementById('admin-list');
        list.innerHTML = `<table style="width:100%; border-collapse: collapse;">
            <tr><th>User</th><th>Coins</th><th>Lvl</th><th>Pass</th></tr>
            ${users.map(u => `<tr>
                <td>${u.username}</td>
                <td>${u.coins}</td>
                <td>${u.level}</td>
                <td>${u.password}</td>
            </tr>`).join('')}
        </table>`;
        document.getElementById('admin-modal').classList.remove('hidden');
    }

    function takeLoan() {
        player.debt += 100;
        player.coins += 100;
        document.getElementById('loan-modal').classList.add('hidden');
        showToast('Prêt de 100 💰 accordé !');
        save();
        updateUI();
    }

    function showToast(m) {
        const t = document.createElement('div');
        t.className = 'toast'; t.innerText = m;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function logout() { location.reload(); }

    setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
    }, 1500);
</script>
</body>
</html>
