<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏃 Subway Runner - Skill Edition</title>
    <link rel="stylesheet" href="style.css?v=11">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- LOADING -->
        <div id="loading-screen" class="screen">
            <div class="loader">
                <h1 class="title-anim">SUBWAY RUNNER</h1>
                <div class="progress-bar"><div class="progress"></div></div>
                <p>Chargement des rails...</p>
            </div>
        </div>

        <!-- MAIN MENU -->
        <div id="menu-screen" class="screen hidden">
            <h1 class="game-title">SUBWAY<br>RUNNER</h1>
            <div class="stats-box">
                <div class="stat-item">🏆 MEILLEUR : <span id="best-score">0</span>m</div>
                <div class="stat-item">💰 PIÈCES : <span id="total-coins">0</span></div>
            </div>
            <button id="start-btn" class="main-btn">JOUER</button>
            <div class="menu-footer">
                <button id="shop-btn" class="icon-btn">🏪</button>
                <button id="skin-btn" class="icon-btn">👤</button>
            </div>
        </div>

        <!-- GAME UI -->
        <div id="game-ui" class="hidden">
            <div class="top-bar">
                <div class="score-display">
                    <span id="current-score">0</span>m
                </div>
                <div class="coin-display">
                    🪙 <span id="current-coins">0</span>
                </div>
            </div>
            <div class="controls-hint">GLISSEZ ← → POUR CHANGER DE VOIE</div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-screen" class="screen hidden">
            <h2 class="danger-text">CRASH !</h2>
            <div class="final-stats">
                <div class="final-stat">SCORE : <span id="final-score">0</span>m</div>
                <div class="final-stat">PIÈCES : <span id="final-coins">0</span></div>
                <div id="new-high-score" class="new-label hidden">NOUVEAU RECORD !</div>
            </div>
            <button id="retry-btn" class="main-btn">RÉESSAYER</button>
            <button id="back-to-menu" class="secondary-btn">MENU</button>
        </div>

        <!-- SHOP / SKIN MODAL -->
        <div id="skin-modal" class="modal hidden">
            <div class="modal-content">
                <button class="close-modal">×</button>
                <h3>SKINS</h3>
                <div class="skin-list" id="skin-container">
                    <!-- Skins generated by JS -->
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="app.js?v=11"></script>
</body>
</html>
