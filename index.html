<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 Cyber Casino Tycoon</title>
    <link rel="stylesheet" href="style.css?v=21">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- HEADER -->
        <header>
            <div class="logo">
                <span class="cyber">CYBER</span><span class="casino">CASINO</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="label">CREDITS</span>
                    <span id="stat-credits" class="value">1000</span>
                </div>
                <div class="stat-item">
                    <span class="label">REVENUE</span>
                    <span id="stat-revenue" class="value">0</span><span class="unit">/s</span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main>
            <!-- LOBBY SCREEN -->
            <div id="lobby-screen" class="screen active">
                <div class="section-title">🎰 TABLES DE JEU</div>
                <div id="tables-grid" class="grid">
                    <!-- Tables will be injected here -->
                </div>

                <div class="section-title">🚀 AMÉLIORATIONS</div>
                <div id="upgrades-grid" class="grid">
                    <!-- Upgrades will be injected here -->
                </div>
            </div>

            <!-- SLOT MACHINE SCREEN -->
            <div id="slot-screen" class="screen hidden">
                <div class="view-header">
                    <button class="back-btn" onclick="showScreen('lobby-screen')">← RETOUR AU LOBBY</button>
                    <h2>MACHINE À SOUS</h2>
                </div>
                <div class="slot-container">
                    <div class="slot-machine">
                        <div class="reels">
                            <div id="reel1" class="reel">💎</div>
                            <div id="reel2" class="reel">💎</div>
                            <div id="reel3" class="reel">💎</div>
                        </div>
                        <div id="slot-result" class="result">CYBER JACKPOT</div>
                        <div class="controls">
                            <button id="spin-btn" class="cyber-btn" onclick="spin()">SPIN (10 🪙)</button>
                        </div>
                    </div>
                    <div class="paytable">
                        <h3>PAYMENTS</h3>
                        <p>💎💎💎 : 1000 🪙</p>
                        <p>7️⃣7️⃣7️⃣ : 200 🪙</p>
                        <p>🍒🍒🍒 : 50 🪙</p>
                        <p>2 PARES : 20 🪙</p>
                    </div>
                </div>
            </div>
        </main>

        <div id="notif-container"></div>
    </div>

    <script src="app.js?v=21"></script>
</body>
</html>
