<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Scratch King - Tickets à Gratter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loading-content">
            <h1 class="game-logo">👑 SCRATCH KING</h1>
            <div class="spinner"></div>
            <p>Préparation de vos gains...</p>
        </div>
    </div>
    <div id="auth-screen" class="screen hidden">
        <div class="auth-card">
            <h1>👑 SCRATCH KING</h1>
            <div class="auth-tabs">
                <button class="tab active" id="tab-login">Connexion</button>
                <button class="tab" id="tab-register">Inscription</button>
            </div>
            <div id="form-login">
                <input type="text" id="username" placeholder="Nom d'utilisateur">
                <button class="btn-primary" id="login-btn">Entrer au Casino</button>
            </div>
            <div id="form-register" class="hidden">
                <input type="text" id="reg-username" placeholder="Choisir un pseudo">
                <button class="btn-primary" id="register-btn">Ouvrir un compte</button>
            </div>
        </div>
    </div>
    <div id="game-screen" class="screen hidden">
        <header class="hud">
            <div class="user-info">
                <span class="username-display">Voyageur</span>
                <span class="level-badge">Niv. <span class="level-value">1</span></span>
            </div>
            <div class="stats">
                <div class="hud-item">💰 <span class="coins-value">500</span></div>
            </div>
        </header>
        <main id="tickets-grid"></main>
    </div>
    <div id="scratch-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="ticket-title">Ticket de Jeu</h2>
                <button class="btn-close" id="close-scratch">&times;</button>
            </div>
            <div id="scratch-area">
                <div id="scratch-result" class="scratch-result"></div>
                <canvas id="scratch-canvas"></canvas>
            </div>
            <div class="scratch-footer">
                <p id="scratch-instruction">Grattez pour découvrir votre gain !</p>
                <button id="collect-btn" class="btn-primary hidden">Récupérer mes gains</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
