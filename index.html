<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏃 Subway Runner</title>
    <link rel="stylesheet" href="style.css?v=14">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- MENU -->
        <div id="menu-screen" class="screen">
            <h1 class="game-title">SUBWAY<br>RUNNER</h1>
            <div class="stats-box">
                <div>🏆 MEILLEUR : <span id="best-score">0</span>m</div>
                <div>💰 PIÈCES : <span id="total-coins">0</span></div>
            </div>
            <button id="start-btn" class="main-btn">JOUER</button>
            <div class="menu-footer">
                <button id="shop-btn" class="icon-btn">🏪 SHOP</button>
            </div>
        </div>

        <!-- GAME UI -->
        <div id="game-ui" class="hidden">
            <div class="top-bar">
                <span id="current-score">0</span>m | 🪙 <span id="current-coins">0</span>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-screen" class="screen hidden">
            <h2 class="danger-text">CRASH !</h2>
            <div class="final-stats">
                <div>SCORE : <span id="final-score">0</span>m</div>
                <div>PIÈCES : <span id="final-coins">0</span></div>
            </div>
            <button id="retry-btn" class="main-btn">RÉESSAYER</button>
            <button id="back-to-menu" class="secondary-btn">MENU</button>
        </div>

        <!-- SHOP -->
        
        <div id="skin-modal" class="modal hidden">
            <div class="modal-content">
                <button class="close-modal">×</button>
                <h3>SKINS</h3>
                <div class="skin-list" id="skin-container"></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="app.js?v=14"></script>
</body>
</html>
